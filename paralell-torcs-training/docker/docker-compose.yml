name: torcs-cluster

x-torcs-template: &torcs-template
  build: jimiwilson/torcs-server:latest
  shm_size: 512m
  restart: unless-stopped
  volumes:
    - ./practise.xml:/root/.torcs/config/raceman/practise.xml

