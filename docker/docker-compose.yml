services:
  torcs-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: torcs-dev
    working_dir: /workspace
    volumes:
      - ..:/workspace
    environment:
      DISPLAY: ${DISPLAY:-}
      TORCS_PORT: "3001"
      ALSOFT_DRIVERS: "null"
      ALUT_DRIVER: "null"
      LIBGL_DRI3_DISABLE: "1"
    # host networking: TORCS UDP port 3001 is directly on localhost — required for
    # eval scripts running on the host (or in another --network=host container) to connect.
    network_mode: host
    stdin_open: true
    tty: true
